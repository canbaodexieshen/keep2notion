name: Annual Heatmap Archive

on:
  workflow_dispatch:
    inputs:
      manual_year:
        description: '手动指定年份生成 (例如填入 2023。如果留空，则默认生成去年的)' 
        required: false
        default: ''
  schedule:
    # 每年1月1日北京时间早上10点 (UTC 2点) 自动触发，避开零点高峰，并确保除夕的数据已被 Notion 汇总完毕
    - cron: "0 2 1 1 *"

jobs:
  archive:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE: ${{ secrets.NOTION_PAGE }}
      KEEP_MOBILE: ${{ secrets.KEEP_MOBILE }}
      KEEP_PASSWORD: ${{ secrets.KEEP_PASSWORD }}
      COUNTRY_CODE: ${{ secrets.COUNTRY_CODE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .

      - name: keep sync
        run: |
          keep2notion

      - name: Wait for Notion Rollup
        run: sleep 60

      - name: Determine Target Year
        run: |
          if [ -n "${{ github.event.inputs.manual_year }}" ]; then
            echo "TARGET_YEAR=${{ github.event.inputs.manual_year }}" >> $GITHUB_ENV
          else
            # 自动触发时，利用系统时间将年份减 1 (生成去年的)
            LAST_YEAR=$(expr $(date +"%Y") - 1)
            echo "TARGET_YEAR=$LAST_YEAR" >> $GITHUB_ENV
          fi

      - name: Generate Annual Heatmap
        run: |
          github_heatmap notion  --notion_token "${{secrets.NOTION_TOKEN}}" --database_id "${{ env.DATABASE_ID }}" --date_prop_name "日期" --value_prop_name "分钟" --unit "分钟" --year ${{ env.TARGET_YEAR }}  --me "${{secrets.NAME}}" --without-type-name --background-color=${{ vars.background_color||'#FFFFFF'}} --track-color=${{ vars.track_color||'#ACE7AE'}} --special-color1=${{ vars.special_color||'#69C16E'}} --special-color2=${{ vars.special_color2||'#549F57'}} --dom-color=${{ vars.dom_color||'#EBEDF0'}} --text-color=${{ vars.text_color||'#000000'}}

      - name: Save to old_heatmap folder
        run: |
          # 创建文件夹并把图移进去，重命名为 年份.svg
          mkdir -p old_heatmap
          mv OUT_FOLDER/notion.svg old_heatmap/${{ env.TARGET_YEAR }}.svg

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add old_heatmap/
          git commit -m "Archive heatmap for ${{ env.TARGET_YEAR }}" || echo "nothing to commit"
          git push || echo "nothing to push"
